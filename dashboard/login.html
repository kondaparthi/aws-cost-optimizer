<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AWS Cost Optimizer</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f6fb;
            --bg-accent: radial-gradient(circle at top left, rgba(39, 110, 241, 0.14), transparent 28%), radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.12), transparent 30%), linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
            --panel: rgba(255, 255, 255, 0.86);
            --panel-border: rgba(148, 163, 184, 0.22);
            --text: #142033;
            --muted: #5f6f85;
            --heading: #0f172a;
            --input-bg: rgba(255, 255, 255, 0.78);
            --input-border: rgba(148, 163, 184, 0.36);
            --input-focus: rgba(37, 99, 235, 0.18);
            --brand: #2563eb;
            --brand-strong: #1d4ed8;
            --brand-soft: rgba(37, 99, 235, 0.1);
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
            --error-bg: rgba(239, 68, 68, 0.12);
            --error-text: #b42318;
            --toggle-bg: rgba(255, 255, 255, 0.68);
            --toggle-border: rgba(148, 163, 184, 0.3);
        }

        body.theme-dark {
            color-scheme: dark;
            --bg: #07111f;
            --bg-accent: radial-gradient(circle at top left, rgba(59, 130, 246, 0.2), transparent 28%), radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.18), transparent 34%), linear-gradient(180deg, #07111f 0%, #0c1728 100%);
            --panel: rgba(10, 17, 30, 0.82);
            --panel-border: rgba(71, 85, 105, 0.4);
            --text: #dbe5f4;
            --muted: #93a4bc;
            --heading: #f8fafc;
            --input-bg: rgba(15, 23, 42, 0.82);
            --input-border: rgba(71, 85, 105, 0.7);
            --input-focus: rgba(96, 165, 250, 0.2);
            --brand: #60a5fa;
            --brand-strong: #3b82f6;
            --brand-soft: rgba(96, 165, 250, 0.14);
            --shadow: 0 30px 80px rgba(2, 6, 23, 0.5);
            --error-bg: rgba(239, 68, 68, 0.16);
            --error-text: #fda29b;
            --toggle-bg: rgba(15, 23, 42, 0.6);
            --toggle-border: rgba(71, 85, 105, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Avenir Next', Avenir, 'Segoe UI', sans-serif;
            background: var(--bg-accent);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            filter: blur(10px);
            z-index: 0;
        }

        body::before {
            width: 320px;
            height: 320px;
            background: rgba(37, 99, 235, 0.12);
            top: -120px;
            left: -80px;
        }

        body::after {
            width: 360px;
            height: 360px;
            background: rgba(16, 185, 129, 0.1);
            bottom: -140px;
            right: -100px;
        }

        .login-container {
            background: var(--panel);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 430px;
            position: relative;
            z-index: 1;
        }

        .login-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.04));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .theme-toggle {
            position: absolute;
            top: 18px;
            right: 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--toggle-border);
            background: var(--toggle-bg);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 10px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            margin-bottom: 18px;
            border-radius: 999px;
            background: var(--brand-soft);
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .login-header h1 {
            color: var(--heading);
            margin-bottom: 10px;
            font-size: 32px;
            letter-spacing: -0.03em;
        }

        .login-header p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--heading);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--input-border);
            border-radius: 14px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        .form-group input::placeholder {
            color: var(--muted);
        }

        .password-wrap {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--muted);
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .password-toggle:hover {
            color: var(--heading);
        }

        .caps-warning {
            display: none;
            margin-top: 8px;
            font-size: 12px;
            color: var(--error-text);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-strong) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 16px 28px rgba(37, 99, 235, 0.24);
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(37, 99, 235, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 12px 14px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.16);
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--muted);
            padding-top: 14px;
            font-size: 14px;
        }

        .subtle-note {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .login-container {
                padding: 28px 22px;
                border-radius: 20px;
            }

            .theme-toggle {
                top: 14px;
                right: 14px;
            }

            .login-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle color theme">
            <span id="themeIcon">◐</span>
            <span id="themeLabel">Theme</span>
        </button>

        <div class="login-header">
            <div class="eyebrow">Secure Access</div>
            <h1>AWS Cost Optimizer</h1>
            <p>Sign in to review findings, validate actions, and manage optimization workflows from one unified workspace.</p>
        </div>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" required>
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">Show</button>
                </div>
                <div class="caps-warning" id="capsWarning">Caps Lock appears to be on.</div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>

        <div class="loading" id="loading">
            <p>Authenticating...</p>
        </div>

        <p class="subtle-note">Use your Cognito account credentials. Session cookies are stored securely and expire automatically.</p>
    </div>

    <script>
        const RAW_AUTH_API_URL = '__AUTH_API_URL__';
        const THEME_STORAGE_KEY = 'dashboard-theme';

        // Configuration - these should be set from CloudFormation outputs
        const CONFIG = {
            AUTH_API_URL: RAW_AUTH_API_URL.includes('__AUTH_API_URL__')
                ? window.location.origin + '/auth'
                : RAW_AUTH_API_URL,
            DASHBOARD_URL: 'index.html',
            SMOKE_MODE: RAW_AUTH_API_URL.includes('__AUTH_API_URL__')
        };

        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const capsWarning = document.getElementById('capsWarning');

        function applyTheme(theme) {
            document.body.classList.toggle('theme-dark', theme === 'dark');
            themeIcon.textContent = theme === 'dark' ? '☀' : '☾';
            themeLabel.textContent = theme === 'dark' ? 'Light' : 'Dark';
        }

        function initializeTheme() {
            const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
            const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            applyTheme(storedTheme || preferredTheme);
        }

        themeToggle.addEventListener('click', () => {
            const nextTheme = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
            localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
            applyTheme(nextTheme);
        });

        // Utility function to get CSRF token if needed
        function getCsrfToken() {
            return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
        }

        // Utility function to show error messages
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        // Utility function to hide error messages
        function hideError() {
            errorMsg.style.display = 'none';
        }

        function updateLoginButtonState() {
            const hasUsername = usernameInput.value.trim().length > 0;
            const hasPassword = passwordInput.value.length > 0;
            loginBtn.disabled = !hasUsername || !hasPassword;
        }

        function togglePasswordVisibility() {
            const reveal = passwordInput.type === 'password';
            passwordInput.type = reveal ? 'text' : 'password';
            passwordToggle.textContent = reveal ? 'Hide' : 'Show';
            passwordToggle.setAttribute('aria-label', reveal ? 'Hide password' : 'Show password');
            passwordInput.focus();
        }

        function updateCapsLockWarning(event) {
            if (event && typeof event.getModifierState === 'function' && event.getModifierState('CapsLock')) {
                capsWarning.style.display = 'block';
            } else {
                capsWarning.style.display = 'none';
            }
        }

        // Login form submission handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (CONFIG.SMOKE_MODE) {
                window.location.href = CONFIG.DASHBOARD_URL;
                return;
            }

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // Basic client-side validation
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            // Disable form and show loading
            loginBtn.disabled = true;
            hideError();
            loading.style.display = 'block';

            try {
                // Call Cognito authentication endpoint
                const response = await fetch(`${CONFIG.AUTH_API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCsrfToken()
                    },
                    credentials: 'include', // Include cookies for session management
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Login successful - redirect to dashboard
                    window.location.href = CONFIG.DASHBOARD_URL;
                } else {
                    // Login failed - show error
                    showError(data.error || 'Login failed');
                }

            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please check your connection and try again.');
            } finally {
                // Re-enable form and hide loading
                updateLoginButtonState();
                loading.style.display = 'none';
            }
        });

        // Check if already logged in on page load
        async function checkAuthStatus() {
            if (CONFIG.SMOKE_MODE) {
                return;
            }

            try {
                const response = await fetch(`${CONFIG.AUTH_API_URL}/validate`, {
                    method: 'GET',
                    credentials: 'include'
                });

                if (response.ok) {
                    // User is already authenticated, redirect to dashboard
                    window.location.href = CONFIG.DASHBOARD_URL;
                }
                // If not authenticated, stay on login page
            } catch (error) {
                // Ignore errors - user will need to login
                console.log('Auth check failed, user needs to login');
            }
        }

        // Check authentication status when page loads
        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            checkAuthStatus();
            updateLoginButtonState();
            usernameInput.focus();
        });

        // Add input validation feedback
        usernameInput.addEventListener('input', function() {
            this.value = this.value.replace(/\s/g, ''); // Remove spaces
            updateLoginButtonState();
        });

        passwordInput.addEventListener('input', updateLoginButtonState);
        passwordInput.addEventListener('keydown', updateCapsLockWarning);
        passwordInput.addEventListener('keyup', updateCapsLockWarning);
        passwordInput.addEventListener('blur', () => {
            capsWarning.style.display = 'none';
        });

        passwordToggle.addEventListener('click', togglePasswordVisibility);

        // Prevent form submission on enter in username field if password is empty
        usernameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
