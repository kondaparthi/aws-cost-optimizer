<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AWS Cost Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #6c757d;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.25);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #764ba2;
        }

        .login-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 AWS Cost Optimizer</h1>
            <p>Secure Dashboard Login</p>
        </div>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>

        <div class="loading" id="loading">
            <p>Authenticating...</p>
        </div>
    </div>

    <script>
        const RAW_AUTH_API_URL = '__AUTH_API_URL__';

        // Configuration - these should be set from CloudFormation outputs
        const CONFIG = {
            AUTH_API_URL: RAW_AUTH_API_URL.includes('__AUTH_API_URL__')
                ? window.location.origin + '/auth'
                : RAW_AUTH_API_URL,
            DASHBOARD_URL: '/index.html'
        };

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');

        // Utility function to get CSRF token if needed
        function getCsrfToken() {
            return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
        }

        // Utility function to show error messages
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        // Utility function to hide error messages
        function hideError() {
            errorMsg.style.display = 'none';
        }

        // Login form submission handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // Basic client-side validation
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            // Disable form and show loading
            loginBtn.disabled = true;
            hideError();
            loading.style.display = 'block';

            try {
                // Call Cognito authentication endpoint
                const response = await fetch(`${CONFIG.AUTH_API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCsrfToken()
                    },
                    credentials: 'include', // Include cookies for session management
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Login successful - redirect to dashboard
                    window.location.href = CONFIG.DASHBOARD_URL;
                } else {
                    // Login failed - show error
                    showError(data.error || 'Login failed');
                }

            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please check your connection and try again.');
            } finally {
                // Re-enable form and hide loading
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Check if already logged in on page load
        async function checkAuthStatus() {
            try {
                const response = await fetch(`${CONFIG.AUTH_API_URL}/validate`, {
                    method: 'GET',
                    credentials: 'include'
                });

                if (response.ok) {
                    // User is already authenticated, redirect to dashboard
                    window.location.href = CONFIG.DASHBOARD_URL;
                }
                // If not authenticated, stay on login page
            } catch (error) {
                // Ignore errors - user will need to login
                console.log('Auth check failed, user needs to login');
            }
        }

        // Check authentication status when page loads
        document.addEventListener('DOMContentLoaded', checkAuthStatus);

        // Add input validation feedback
        document.getElementById('username').addEventListener('input', function() {
            this.value = this.value.replace(/\s/g, ''); // Remove spaces
        });

        // Prevent form submission on enter in username field if password is empty
        document.getElementById('username').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
