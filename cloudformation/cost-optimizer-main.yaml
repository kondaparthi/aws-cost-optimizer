AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Cost Optimizer Framework - Complete deployment with Lambdas, EventBridge, and monitoring'

Parameters:
  ConfigS3Bucket:
    Type: String
    Description: S3 bucket containing cost-optimizer config.yaml
    
  ConfigS3Key:
    Type: String
    Default: config/cost-optimizer.yaml
    Description: S3 key for config.yaml file

  CodeS3Bucket:
    Type: String
    Description: S3 bucket containing Lambda deployment package

  CodeS3Key:
    Type: String
    Description: S3 key for Lambda deployment package zip
  
  ReportS3Bucket:
    Type: String
    Description: S3 bucket for storing analysis reports
  
  ReportS3Prefix:
    Type: String
    Default: cost-reports/
    Description: S3 prefix for reports (e.g., cost-reports/)
  
  NotificationEmail:
    Type: String
    Description: Email address for SNS notifications
    
  AnalysisSchedule:
    Type: String
    Default: cron(0 2 * * ? *)
    Description: EventBridge cron schedule for analysis (default 2 AM UTC daily)
  
  SchedulerSchedule:
    Type: String
    Default: cron(0 6,18 * * ? *)
    Description: EventBridge cron schedule for scheduler (default 6 AM and 6 PM UTC)
  
  LambdaTimeout:
    Type: Number
    Default: 900
    MinValue: 30
    MaxValue: 900
    Description: Lambda timeout in seconds
  
  LambdaMemory:
    Type: Number
    Default: 512
    AllowedValues: [128, 256, 512, 1024, 1536, 2048]
    Description: Lambda memory allocation in MB

  VpcSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for Lambda VPC configuration

  VpcSecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: List of security group IDs for Lambda VPC configuration

  DashboardS3Bucket:
    Type: String
    Description: S3 bucket for hosting the dashboard (must be unique globally)

  AdminEmail:
    Type: String
    Description: Administrator email used for Cognito user provisioning workflows

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: S3 Configuration
        Parameters:
          - ConfigS3Bucket
          - ConfigS3Key
          - CodeS3Bucket
          - CodeS3Key
          - ReportS3Bucket
          - ReportS3Prefix
      - Label:
          default: Notifications
        Parameters:
          - NotificationEmail
      - Label:
          default: Schedules
        Parameters:
          - AnalysisSchedule
          - SchedulerSchedule
      - Label:
          default: Lambda Configuration
        Parameters:
          - LambdaTimeout
          - LambdaMemory

Resources:
  # ========================================================================
  # SNS Topic for Notifications
  # ========================================================================
  
  CostOptimizerTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Cost Optimizer Notifications
      TopicName: aws-cost-optimizer-notifications
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email

  # ========================================================================
  # IAM Roles for Lambdas
  # ========================================================================
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cost-optimizer-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CostOptimizerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 access for config and reports
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${ConfigS3Bucket}/*"
                  - !Sub "arn:aws:s3:::${ReportS3Bucket}/*"

              # S3 metadata/list access required by analyzers
              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                  - s3:GetBucketTagging
                  - s3:ListBucketMultipartUploads
                Resource: "*"
              
              # EC2 read access for analysis
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  - ec2:DescribeSnapshots
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - autoscaling:DescribeAutoScalingGroups
                  - cloudwatch:GetMetricStatistics
                  - logs:DescribeLogGroups
                Resource: "*"
              
              # EC2 start/stop for scheduler
              - Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: !Sub "arn:${AWS::Partition}:ec2:*:${AWS::AccountId}:instance/*"
              
              # SNS for notifications
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !GetAtt CostOptimizerTopic.TopicArn
              
              # Systems Manager Parameter Store (optional for config)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:${AWS::Partition}:ssm:*:${AWS::AccountId}:parameter/cost-optimizer/*"
              
              # Cross-account role assumption (for multi-account)
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !Sub "arn:${AWS::Partition}:iam::*:role/CostOptimizerRole"

  # ========================================================================
  # Lambda Layer with Framework Code
  # ========================================================================
  
  # Note: In production, build this as part of CI/CD
  # For now, we reference the framework code included in Lambda function
  
  # ========================================================================
  # Lambda: Cost Analysis (nightly)
  # ========================================================================
  
  AnalysisLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cost-optimizer-analysis
      Runtime: python3.11
      Handler: aws_cost_optimizer.lambda.analysis_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      VpcConfig:
        SecurityGroupIds: !Ref VpcSecurityGroupIds
        SubnetIds: !Ref VpcSubnetIds
      Environment:
        Variables:
          CONFIG_S3_BUCKET: !Ref ConfigS3Bucket
          CONFIG_S3_KEY: !Ref ConfigS3Key
          REPORT_S3_BUCKET: !Ref ReportS3Bucket
          REPORT_S3_PREFIX: !Ref ReportS3Prefix
          SNS_TOPIC_ARN: !GetAtt CostOptimizerTopic.TopicArn
          DRY_RUN: "false"
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Tags:
        - Key: Application
          Value: CostOptimizer
        - Key: Component
          Value: Analysis

  # ========================================================================
  # Lambda: EC2/EMR Scheduler
  # ========================================================================
  
  SchedulerLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cost-optimizer-scheduler
      Runtime: python3.11
      Handler: aws_cost_optimizer.lambda.scheduler_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      VpcConfig:
        SecurityGroupIds: !Ref VpcSecurityGroupIds
        SubnetIds: !Ref VpcSubnetIds
      Environment:
        Variables:
          TIMEZONE: UTC
          DRY_RUN: "false"
          SNS_TOPIC_ARN: !GetAtt CostOptimizerTopic.TopicArn
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Tags:
        - Key: Application
          Value: CostOptimizer
        - Key: Component
          Value: Scheduler

  # ========================================================================
  # EventBridge Rules
  # ========================================================================
  
  AnalysisEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: cost-optimizer-analysis-schedule
      Description: Trigger cost analysis on schedule
      ScheduleExpression: !Ref AnalysisSchedule
      State: ENABLED
      Targets:
        - Arn: !GetAtt AnalysisLambdaFunction.Arn
          Id: CostOptimizerAnalysisTarget

  AnalysisEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AnalysisLambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AnalysisEventRule.Arn

  SchedulerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: cost-optimizer-scheduler
      Description: Trigger EC2/EMR scheduler on schedule
      ScheduleExpression: !Ref SchedulerSchedule
      State: ENABLED
      Targets:
        - Arn: !GetAtt SchedulerLambdaFunction.Arn
          Id: CostOptimizerSchedulerTarget

  SchedulerEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SchedulerLambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SchedulerEventRule.Arn

  # ========================================================================
  # CloudWatch Log Groups
  # ========================================================================
  
  AnalysisLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/cost-optimizer-analysis
      RetentionInDays: 30

  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/cost-optimizer-scheduler
      RetentionInDays: 30

  # ========================================================================
  # CloudWatch Alarms
  # ========================================================================
  
  AnalysisErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: CostOptimizer-Analysis-Errors
      AlarmDescription: Alert if analysis Lambda has errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref AnalysisLambdaFunction
      AlarmActions:
        - !GetAtt CostOptimizerTopic.TopicArn

  SchedulerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: CostOptimizer-Scheduler-Errors
      AlarmDescription: Alert if scheduler Lambda has errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref SchedulerLambdaFunction
      AlarmActions:
        - !GetAtt CostOptimizerTopic.TopicArn

  # ========================================================================
  # S3 Bucket for Dashboard
  # ========================================================================
  
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DashboardS3Bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOriginAccessIdentity}"
            Action: s3:GetObject
            Resource: !Sub "${DashboardBucket}/*"

  # ========================================================================
  # Cognito User Pool for Authentication
  # ========================================================================
  
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: cost-optimizer-dashboard-users
      UserPoolTags:
        AdminEmail: !Ref AdminEmail
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: cost-optimizer-dashboard-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO

  # ========================================================================
  # Lambda@Edge for Authentication
  # ========================================================================
  
  AuthEdgeLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cost-optimizer-auth-check
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaEdgeExecutionRole.Arn
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              request = event['Records'][0]['cf']['request']
              headers = request['headers']

              # Allow access to login page and auth API routes
              if request['uri'] == '/login.html' or request['uri'].startswith('/auth/'):
                  return request

              # Check for Cognito session cookie
              cookies = headers.get('cookie', [{}])[0].get('value', '')
              session_cookie = None

              if cookies:
                  for cookie in cookies.split(';'):
                      cookie = cookie.strip()
                      if cookie.startswith('cognito_session='):
                          session_cookie = cookie.split('=', 1)[1]
                          break

              # Require a Cognito session cookie for protected pages.
              if not session_cookie:
                  # Redirect to login
                  return {
                      'status': '302',
                      'statusDescription': 'Found',
                      'headers': {
                          'location': [{
                              'key': 'Location',
                              'value': '/login.html'
                          }],
                          'cache-control': [{
                              'key': 'Cache-Control',
                              'value': 'no-cache, no-store, must-revalidate'
                          }]
                      }
                  }

              return request

  AuthEdgeLambdaVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref AuthEdgeLambda
      Description: !Sub "Version for edge auth check (${AWS::StackName})"

  LambdaEdgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cost-optimizer-edge-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - edgelambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # ========================================================================
  # Auth Lambda Function for Cognito Authentication
  # ========================================================================

  AuthLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-auth-lambda"
      Runtime: python3.11
      Handler: aws_cost_optimizer.lambda.auth_handler.lambda_handler
      Role: !GetAtt AuthLambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Environment:
        Variables:
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          ALLOWED_DASHBOARD_GROUPS: "dashboard-users,admin"
          CORS_ORIGIN: !Sub "https://${CloudFrontDistribution.DomainName}"
      Timeout: 30

  AuthLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-auth-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminInitiateAuth
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:ListUsers
                Resource:
                  - !GetAtt CognitoUserPool.Arn

  # ========================================================================
  # API Gateway for Auth Endpoints
  # ========================================================================

  AuthApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AWS::StackName}-auth-api"
      Description: Authentication API for Cost Optimizer Dashboard
      EndpointConfiguration:
        Types:
          - REGIONAL

  AuthApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !GetAtt AuthApiGateway.RootResourceId
      PathPart: auth

  AuthLoginResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: login

  AuthValidateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: validate

  AuthRefreshResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: refresh

  AuthLogoutResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: logout

  AuthLoginMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthLoginResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthValidateMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthValidateResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthRefreshMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthRefreshResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthLogoutMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthLogoutResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - AuthLoginMethodWithPath
      - AuthValidateMethodWithPath
      - AuthRefreshMethodWithPath
      - AuthLogoutMethodWithPath
    Properties:
      RestApiId: !Ref AuthApiGateway
      StageName: prod

  AuthLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${AuthApiGateway}/*"

  # ========================================================================
  # CloudFront Distribution for Secure Dashboard
  # ========================================================================
  
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${DashboardS3Bucket}"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: Cost Optimizer Dashboard
        DefaultRootObject: index.html
        Enabled: true
        Origins:
          - DomainName: !GetAtt DashboardBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}"
          - DomainName: !Sub "${AuthApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
            Id: ApiGatewayOrigin
            OriginPath: /prod
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          LambdaFunctionAssociations:
            - EventType: viewer-request
              LambdaFunctionARN: !Ref AuthEdgeLambdaVersion
        CacheBehaviors:
          - PathPattern: login.html
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
          - PathPattern: auth/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            Compress: true
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: all
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
        PriceClass: PriceClass_100
        HttpVersion: http2

Outputs:
  AnalysisLambdaFunctionArn:
    Description: ARN of analysis Lambda function
    Value: !GetAtt AnalysisLambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AnalysisLambdaArn"

  SchedulerLambdaFunctionArn:
    Description: ARN of scheduler Lambda function
    Value: !GetAtt SchedulerLambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SchedulerLambdaArn"

  AuthLambdaFunctionArn:
    Description: ARN of authentication Lambda function
    Value: !GetAtt AuthLambda.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AuthLambdaArn"

  SNSTopicArn:
    Description: ARN of SNS topic for notifications
    Value: !GetAtt CostOptimizerTopic.TopicArn
    Export:
      Name: !Sub "${AWS::StackName}-SNSTopicArn"

  AnalysisLogGroupName:
    Description: CloudWatch Log Group for analysis Lambda
    Value: !Ref AnalysisLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-AnalysisLogGroup"

  SchedulerLogGroupName:
    Description: CloudWatch Log Group for scheduler Lambda
    Value: !Ref SchedulerLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-SchedulerLogGroup"

  DashboardURL:
    Description: Secure CloudFront URL for the dashboard
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-DashboardURL"

  AuthApiURL:
    Description: API Gateway URL for authentication endpoints
    Value: !Sub "https://${AuthApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "${AWS::StackName}-AuthApiURL"

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserPoolId"

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserPoolClientId"

  AnalysisSchedule:
    Description: Analysis schedule (EventBridge cron)
    Value: !Ref AnalysisSchedule

  SchedulerSchedule:
    Description: Scheduler schedule (EventBridge cron)
    Value: !Ref SchedulerSchedule

  ConfigLocation:
    Description: S3 location of configuration file
    Value: !Sub "s3://${ConfigS3Bucket}/${ConfigS3Key}"

  ReportLocation:
    Description: S3 location for reports
    Value: !Sub "s3://${ReportS3Bucket}/${ReportS3Prefix}"

  DeploymentInstructions:
    Description: Next steps for deployment
    Value: !Sub "1) Upload Lambda package to s3://${CodeS3Bucket}/${CodeS3Key}\n2) Configure config.yaml in S3\n3) Verify SNS subscription in email\n4) Monitor via CloudWatch Dashboard"
