AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Cost Optimizer Framework - Complete deployment with Lambdas, EventBridge, and monitoring'

Parameters:
  ConfigS3Bucket:
    Type: String
    Description: S3 bucket containing cost-optimizer config.yaml
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name.
    
  ConfigS3Key:
    Type: String
    Default: config/cost-optimizer.yaml
    Description: S3 key for config.yaml file

  CodeS3Bucket:
    Type: String
    Description: S3 bucket containing Lambda deployment package
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name.

  CodeS3Key:
    Type: String
    Description: S3 key for Lambda deployment package zip
  
  ReportS3Bucket:
    Type: String
    Description: S3 bucket for storing analysis reports
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name.

  DecisionsS3Bucket:
    Type: String
    Description: S3 bucket for storing scheduler decision artifacts
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name.
  
  ReportS3Prefix:
    Type: String
    Default: cost-reports/
    Description: S3 prefix for reports (e.g., cost-reports/)
  
  NotificationEmail:
    Type: String
    Description: Email address for SNS notifications
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
    ConstraintDescription: Must be a valid email address.
    
  AnalysisSchedule:
    Type: String
    Default: cron(0 2 * * ? *)
    Description: EventBridge cron schedule for analysis (default 2 AM UTC daily)
    AllowedPattern: '^cron\(.+\)$'
    ConstraintDescription: Must be a valid EventBridge cron expression.
  
  SchedulerSchedule:
    Type: String
    Default: cron(0 6,18 * * ? *)
    Description: EventBridge cron schedule for scheduler (default 6 AM and 6 PM UTC)
    AllowedPattern: '^cron\(.+\)$'
    ConstraintDescription: Must be a valid EventBridge cron expression.
  
  LambdaTimeout:
    Type: Number
    Default: 900
    MinValue: 30
    MaxValue: 900
    Description: Lambda timeout in seconds (900 recommended for multi-account scans; use Step Functions for workloads over 15 minutes)
  
  LambdaMemory:
    Type: Number
    Default: 1024
    AllowedValues: [1024, 1536, 2048, 3008]
    Description: Lambda memory allocation in MB (1024 minimum recommended for multi-account scans)

  VpcSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for Lambda VPC configuration

  VpcSecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: List of security group IDs for Lambda VPC configuration

  DashboardS3Bucket:
    Type: String
    Description: S3 bucket for hosting the dashboard (must be unique globally)
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name.

  AdminEmail:
    Type: String
    Description: Administrator email used for Cognito user provisioning workflows
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
    ConstraintDescription: Must be a valid email address.

  CrossAccountExternalId:
    Type: String
    Description: External ID used for cross-account role assumption
    NoEcho: true
    MinLength: 12
    MaxLength: 128
    AllowedPattern: '^[A-Za-z0-9+=,.@:/_-]+$'
    ConstraintDescription: Must be 12-128 chars using IAM ExternalId-compatible characters.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: S3 Configuration
        Parameters:
          - ConfigS3Bucket
          - ConfigS3Key
          - CodeS3Bucket
          - CodeS3Key
          - ReportS3Bucket
          - DecisionsS3Bucket
          - ReportS3Prefix
      - Label:
          default: Notifications
        Parameters:
          - NotificationEmail
      - Label:
          default: Schedules
        Parameters:
          - AnalysisSchedule
          - SchedulerSchedule
      - Label:
          default: Lambda Configuration
        Parameters:
          - LambdaTimeout
          - LambdaMemory

Resources:
  # ========================================================================
  # SNS Topic for Notifications
  # ========================================================================
  
  CostOptimizerTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Cost Optimizer Notifications
      TopicName: aws-cost-optimizer-notifications
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email

  CostOptimizerTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CostOptimizerTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOnlyOptimizerLambdaRolesToPublish
            Effect: Allow
            Principal:
              AWS:
                - !GetAtt LambdaExecutionRole.Arn
                - !GetAtt AuthLambdaExecutionRole.Arn
            Action: sns:Publish
            Resource: !GetAtt CostOptimizerTopic.TopicArn
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: sns:Publish
            Resource: !GetAtt CostOptimizerTopic.TopicArn
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # ========================================================================
  # IAM Roles for Lambdas
  # ========================================================================
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cost-optimizer-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CostOptimizerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 access for config and reports
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${ConfigS3Bucket}/*"
                  - !Sub "arn:aws:s3:::${ReportS3Bucket}/*"
                  - !Sub "arn:aws:s3:::${DecisionsS3Bucket}/*"

              # S3 metadata/list access required by analyzers
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketTagging
                  - s3:ListBucketMultipartUploads
                Resource:
                  - !Sub "arn:aws:s3:::${ConfigS3Bucket}"
                  - !Sub "arn:aws:s3:::${ReportS3Bucket}"
                  - !Sub "arn:aws:s3:::${DecisionsS3Bucket}"
              
              # EC2 read access for analysis
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  - ec2:DescribeSnapshots
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - autoscaling:DescribeAutoScalingGroups
                  - cloudwatch:GetMetricStatistics
                  - logs:DescribeLogGroups
                Resource: "*"
              
              # EC2 start/stop for scheduler
              - Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: !Sub "arn:${AWS::Partition}:ec2:*:${AWS::AccountId}:instance/*"

              - Effect: Allow
                Action:
                  - ec2:DeleteSnapshot
                  - ec2:DeleteVolume
                Resource: "*"
                Condition:
                  StringEqualsIfExists:
                    ec2:ResourceTag/CostOptimizerProtected: "false"
                  StringNotEqualsIfExists:
                    ec2:ResourceTag/Environment:
                      - prod
                      - production
              
              # SNS for notifications
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !GetAtt CostOptimizerTopic.TopicArn
              
              # Systems Manager Parameter Store (optional for config)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:${AWS::Partition}:ssm:*:${AWS::AccountId}:parameter/cost-optimizer/*"
              
              # Cross-account role assumption (for multi-account)
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !Sub "arn:${AWS::Partition}:iam::*:role/CostOptimizerRole"
                Condition:
                  StringEquals:
                    sts:ExternalId: !Ref CrossAccountExternalId

  # ========================================================================
  # Lambda Layer with Framework Code
  # ========================================================================
  
  # Note: In production, build this as part of CI/CD
  # For now, we reference the framework code included in Lambda function
  
  # ========================================================================
  # Lambda: Cost Analysis (nightly)
  # ========================================================================
  
  AnalysisLambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - AnalysisLogGroup
    Properties:
      FunctionName: cost-optimizer-analysis
      Runtime: python3.11
      Handler: aws_cost_optimizer.lambda.analysis_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      VpcConfig:
        SecurityGroupIds: !Ref VpcSecurityGroupIds
        SubnetIds: !Ref VpcSubnetIds
      Environment:
        Variables:
          CONFIG_S3_BUCKET: !Ref ConfigS3Bucket
          CONFIG_S3_KEY: !Ref ConfigS3Key
          REPORT_S3_BUCKET: !Ref ReportS3Bucket
          DECISIONS_S3_BUCKET: !Ref DecisionsS3Bucket
          REPORT_S3_PREFIX: !Ref ReportS3Prefix
          SNS_TOPIC_ARN: !GetAtt CostOptimizerTopic.TopicArn
          DRY_RUN: "false"
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Tags:
        - Key: Application
          Value: CostOptimizer
        - Key: Component
          Value: Analysis

  # ========================================================================
  # Lambda: EC2/EMR Scheduler
  # ========================================================================
  
  SchedulerLambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - SchedulerLogGroup
    Properties:
      FunctionName: cost-optimizer-scheduler
      Runtime: python3.11
      Handler: aws_cost_optimizer.lambda.scheduler_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      VpcConfig:
        SecurityGroupIds: !Ref VpcSecurityGroupIds
        SubnetIds: !Ref VpcSubnetIds
      Environment:
        Variables:
          TIMEZONE: UTC
          DRY_RUN: "false"
          DECISIONS_S3_BUCKET: !Ref DecisionsS3Bucket
          SNS_TOPIC_ARN: !GetAtt CostOptimizerTopic.TopicArn
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Tags:
        - Key: Application
          Value: CostOptimizer
        - Key: Component
          Value: Scheduler

  # ========================================================================
  # EventBridge Rules
  # ========================================================================
  
  AnalysisEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: cost-optimizer-analysis-schedule
      Description: Trigger cost analysis on schedule
      ScheduleExpression: !Ref AnalysisSchedule
      State: ENABLED
      Targets:
        - Arn: !GetAtt AnalysisLambdaFunction.Arn
          Id: CostOptimizerAnalysisTarget
          DeadLetterConfig:
            Arn: !GetAtt AnalysisFailureQueue.Arn
          RetryPolicy:
            MaximumRetryAttempts: 2
            MaximumEventAgeInSeconds: 3600

  AnalysisEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AnalysisLambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AnalysisEventRule.Arn

  SchedulerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: cost-optimizer-scheduler
      Description: Trigger EC2/EMR scheduler on schedule
      ScheduleExpression: !Ref SchedulerSchedule
      State: ENABLED
      Targets:
        - Arn: !GetAtt SchedulerLambdaFunction.Arn
          Id: CostOptimizerSchedulerTarget

  SchedulerEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SchedulerLambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SchedulerEventRule.Arn

  # ========================================================================
  # CloudWatch Log Groups
  # ========================================================================

  LogsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypted CloudWatch Logs
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootAccountAdmin
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchLogsUse
            Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'

  LogsKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-cw-logs"
      TargetKeyId: !Ref LogsKmsKey
  
  AnalysisLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/cost-optimizer-analysis
      RetentionInDays: 90
      KmsKeyId: !GetAtt LogsKmsKey.Arn

  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/cost-optimizer-scheduler
      RetentionInDays: 90
      KmsKeyId: !GetAtt LogsKmsKey.Arn

  AnalysisFailureQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-analysis-failures"
      KmsMasterKeyId: alias/aws/sqs
      MessageRetentionPeriod: 1209600

  AnalysisErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AnalysisLogGroup
      FilterPattern: '"ERROR"'
      MetricTransformations:
        - MetricValue: '1'
          MetricNamespace: CostOptimizer
          MetricName: AnalysisErrorCount

  # ========================================================================
  # CloudWatch Alarms
  # ========================================================================
  
  AnalysisErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: CostOptimizer-Analysis-Errors
      AlarmDescription: Alert if analysis Lambda has errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref AnalysisLambdaFunction
      AlarmActions:
        - !GetAtt CostOptimizerTopic.TopicArn

  SchedulerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: CostOptimizer-Scheduler-Errors
      AlarmDescription: Alert if scheduler Lambda has errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref SchedulerLambdaFunction
      AlarmActions:
        - !GetAtt CostOptimizerTopic.TopicArn

  AnalysisStructuredErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-Analysis-Structured-Errors"
      AlarmDescription: Alarm on ERROR log entries from analysis Lambda
      Namespace: CostOptimizer
      MetricName: AnalysisErrorCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !GetAtt CostOptimizerTopic.TopicArn

  AnalysisFailureQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-Analysis-DLQ-Messages"
      AlarmDescription: Alarm when EventBridge delivery failures accumulate in analysis DLQ
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AnalysisFailureQueue.QueueName
      AlarmActions:
        - !GetAtt CostOptimizerTopic.TopicArn

  # ========================================================================
  # Managed Findings/Decisions Buckets
  # ========================================================================

  FindingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ReportS3Bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldFindings
            Status: Enabled
            ExpirationInDays: 90

  DecisionsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DecisionsS3Bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldDecisions
            Status: Enabled
            ExpirationInDays: 90

  FindingsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FindingsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaRoleReadWriteFindings
            Effect: Allow
            Principal:
              AWS: !GetAtt LambdaExecutionRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::${ReportS3Bucket}/*"

  DecisionsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DecisionsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaRoleReadWriteDecisions
            Effect: Allow
            Principal:
              AWS: !GetAtt LambdaExecutionRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::${DecisionsS3Bucket}/*"

  # ========================================================================
  # S3 Bucket for Dashboard
  # ========================================================================
  
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DashboardS3Bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  DashboardLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DashboardS3Bucket}-logs"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DashboardLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontLogsWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${DashboardS3Bucket}-logs/cloudfront/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: AllowCloudFrontLogsAclCheck
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub "arn:aws:s3:::${DashboardS3Bucket}-logs"

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOriginAccessIdentity}"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${DashboardS3Bucket}/*"

  # ========================================================================
  # Cognito User Pool for Authentication
  # ========================================================================
  
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: cost-optimizer-dashboard-users
      UserPoolTags:
        AdminEmail: !Ref AdminEmail
      Policies:
        PasswordPolicy:
          MinimumLength: 14
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      MfaConfiguration: OPTIONAL
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: cost-optimizer-dashboard-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      PreventUserExistenceErrors: LEGACY
      SupportedIdentityProviders:
        - COGNITO

  # ========================================================================
  # Lambda@Edge for Authentication
  # ========================================================================
  
  AuthEdgeLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cost-optimizer-auth-check
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaEdgeExecutionRole.Arn
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              request = event['Records'][0]['cf']['request']
              headers = request['headers']

              # Allow access to login page and auth API routes
              if request['uri'] == '/login.html' or request['uri'].startswith('/auth/'):
                  return request

              # Check for Cognito session cookie
              cookies = headers.get('cookie', [{}])[0].get('value', '')
              session_cookie = None

              if cookies:
                  for cookie in cookies.split(';'):
                      cookie = cookie.strip()
                      if cookie.startswith('cognito_session='):
                          session_cookie = cookie.split('=', 1)[1]
                          break

              # Require a Cognito session cookie for protected pages.
              if not session_cookie:
                  # Redirect to login
                  return {
                      'status': '302',
                      'statusDescription': 'Found',
                      'headers': {
                          'location': [{
                              'key': 'Location',
                              'value': '/login.html'
                          }],
                          'cache-control': [{
                              'key': 'Cache-Control',
                              'value': 'no-cache, no-store, must-revalidate'
                          }]
                      }
                  }

              return request

  AuthEdgeLambdaVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref AuthEdgeLambda
      Description: !Sub "Version for edge auth check (${AWS::StackName})"

  SecurityHeadersEdgeLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cost-optimizer-security-headers
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaEdgeExecutionRole.Arn
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              response = event['Records'][0]['cf']['response']
              headers = response.setdefault('headers', {})
              headers['strict-transport-security'] = [{
                  'key': 'Strict-Transport-Security',
                  'value': 'max-age=63072000; includeSubDomains; preload'
              }]
              headers['x-frame-options'] = [{
                  'key': 'X-Frame-Options',
                  'value': 'DENY'
              }]
              headers['x-content-type-options'] = [{
                  'key': 'X-Content-Type-Options',
                  'value': 'nosniff'
              }]
              headers['content-security-policy'] = [{
                  'key': 'Content-Security-Policy',
                  'value': "default-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'"
              }]
              return response

  SecurityHeadersEdgeLambdaVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref SecurityHeadersEdgeLambda
      Description: !Sub "Version for edge security headers (${AWS::StackName})"

  LambdaEdgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cost-optimizer-edge-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - edgelambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # ========================================================================
  # Auth Lambda Function for Cognito Authentication
  # ========================================================================

  AuthLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-auth-lambda"
      Runtime: python3.11
      Handler: aws_cost_optimizer.lambda.auth_handler.lambda_handler
      Role: !GetAtt AuthLambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Environment:
        Variables:
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          ALLOWED_DASHBOARD_GROUPS: "dashboard-users,admin"
          CORS_ORIGIN: !Sub "https://${CloudFrontDistribution.DomainName}"
      Timeout: 30

  AuthLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-auth-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminInitiateAuth
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:ListUsers
                Resource:
                  - !GetAtt CognitoUserPool.Arn

  # ========================================================================
  # API Gateway for Auth Endpoints
  # ========================================================================

  AuthApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AWS::StackName}-auth-api"
      Description: Authentication API for Cost Optimizer Dashboard
      EndpointConfiguration:
        Types:
          - REGIONAL

  AuthApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !GetAtt AuthApiGateway.RootResourceId
      PathPart: auth

  AuthLoginResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: login

  AuthValidateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: validate

  AuthRefreshResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: refresh

  AuthLogoutResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthApiGateway
      ParentId: !Ref AuthApiGatewayResource
      PathPart: logout

  AuthLoginMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthLoginResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthValidateMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthValidateResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthRefreshMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthRefreshResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthLogoutMethodWithPath:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthApiGateway
      ResourceId: !Ref AuthLogoutResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthLambda.Arn}/invocations"

  AuthApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - AuthLoginMethodWithPath
      - AuthValidateMethodWithPath
      - AuthRefreshMethodWithPath
      - AuthLogoutMethodWithPath
    Properties:
      RestApiId: !Ref AuthApiGateway
      StageName: prod

  AuthLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${AuthApiGateway}/*"

  # ========================================================================
  # CloudFront Distribution for Secure Dashboard
  # ========================================================================
  
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${DashboardS3Bucket}"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - DashboardBucketPolicy
      - DashboardLogsBucketPolicy
    Properties:
      DistributionConfig:
        Comment: Cost Optimizer Dashboard
        DefaultRootObject: index.html
        Enabled: true
        Logging:
          Bucket: !GetAtt DashboardLogsBucket.DomainName
          IncludeCookies: false
          Prefix: cloudfront/
        Origins:
          - DomainName: !GetAtt DashboardBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}"
          - DomainName: !Sub "${AuthApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
            Id: ApiGatewayOrigin
            OriginPath: /prod
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          LambdaFunctionAssociations:
            - EventType: viewer-request
              LambdaFunctionARN: !Ref AuthEdgeLambdaVersion
            - EventType: viewer-response
              LambdaFunctionARN: !Ref SecurityHeadersEdgeLambdaVersion
        CacheBehaviors:
          - PathPattern: login.html
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
          - PathPattern: auth/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            Compress: true
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: all
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
        PriceClass: PriceClass_100
        HttpVersion: http2

  DashboardAccessSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/dashboard/access"
      Description: Dashboard and auth API endpoints for Cost Optimizer
      SecretString: !Sub |
        {
          "dashboard_url": "https://${CloudFrontDistribution.DomainName}",
          "auth_api_url": "https://${AuthApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
        }

Outputs:
  AnalysisLambdaFunctionArn:
    Description: ARN of analysis Lambda function
    Value: !GetAtt AnalysisLambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AnalysisLambdaArn"

  SchedulerLambdaFunctionArn:
    Description: ARN of scheduler Lambda function
    Value: !GetAtt SchedulerLambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SchedulerLambdaArn"

  AuthLambdaFunctionArn:
    Description: ARN of authentication Lambda function
    Value: !GetAtt AuthLambda.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AuthLambdaArn"

  SNSTopicArn:
    Description: ARN of SNS topic for notifications
    Value: !GetAtt CostOptimizerTopic.TopicArn
    Export:
      Name: !Sub "${AWS::StackName}-SNSTopicArn"

  AnalysisLogGroupName:
    Description: CloudWatch Log Group for analysis Lambda
    Value: !Ref AnalysisLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-AnalysisLogGroup"

  SchedulerLogGroupName:
    Description: CloudWatch Log Group for scheduler Lambda
    Value: !Ref SchedulerLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-SchedulerLogGroup"

  DashboardAccessSecretArn:
    Description: Secrets Manager ARN containing dashboard and auth API endpoints
    Value: !Ref DashboardAccessSecret
    Export:
      Name: !Sub "${AWS::StackName}-DashboardAccessSecretArn"

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserPoolId"

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserPoolClientId"

  AnalysisSchedule:
    Description: Analysis schedule (EventBridge cron)
    Value: !Ref AnalysisSchedule

  SchedulerSchedule:
    Description: Scheduler schedule (EventBridge cron)
    Value: !Ref SchedulerSchedule

  DeploymentInstructions:
    Description: Next steps for deployment
    Value: !Sub "1) Upload Lambda package to s3://${CodeS3Bucket}/${CodeS3Key}\n2) Configure config.yaml in s3://${ConfigS3Bucket}/${ConfigS3Key}\n3) Retrieve URLs from Secrets Manager: ${DashboardAccessSecret}\n4) Verify SNS subscription in email and monitor CloudWatch alarms"
